<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Artizano — Porosi</title>
<meta name="theme-color" content="#3B1F0E">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Porosi">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  :root{
    --brun:#1A0A05;
    --guld:#F0A500;
    --guld-lys:#FFD166;
    --bg:#F7F8FA;
    --bg2:#ECEEF2;
    --hvid:#FFFFFF;
    --tekst:#111827;
    --tekst-lys:#6B7280;
    --groen:#10B981;
    --roed:#EF4444;
    --border:#E2E5EA;
  }

  body{
    font-family:-apple-system,'Inter','Segoe UI',system-ui,sans-serif;
    background:var(--bg);color:var(--tekst);
    min-height:100dvh;display:flex;flex-direction:column;
    -webkit-font-smoothing:antialiased;
  }

  /* ── HEADER ── */
  #header{
    background:var(--brun);color:#fff;
    padding:0 18px;height:56px;
    display:flex;align-items:center;justify-content:space-between;
    position:sticky;top:0;z-index:100;
    box-shadow:0 2px 12px rgba(0,0,0,.35);
  }
  #header h1{font-size:1.1rem;font-weight:800;letter-spacing:.4px;color:#fff}
  #header h1 span{color:var(--guld-lys);font-weight:400}
  #kurv-badge{
    background:var(--guld);color:#fff;
    border-radius:99px;font-size:.72rem;font-weight:800;
    padding:3px 10px;min-width:28px;text-align:center;display:none;
    box-shadow:0 2px 6px rgba(240,165,0,.4);
  }

  /* ── BORD PICKER ── */
  #bord-sektion{
    background:var(--hvid);
    border-bottom:2px solid var(--border);
    padding:16px 16px 18px;
  }
  #bord-sektion label{
    font-size:.72rem;font-weight:800;text-transform:uppercase;
    letter-spacing:.8px;color:var(--tekst-lys);display:block;margin-bottom:12px;
  }
  #bord-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(72px,1fr));
    gap:10px;
  }
  .bord-btn{
    aspect-ratio:1;
    border:2px solid var(--border);
    border-radius:16px;
    background:var(--bg);
    font-size:1.4rem;font-weight:800;
    color:var(--tekst-lys);cursor:pointer;
    transition:all .15s;font-family:inherit;
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    gap:3px;
    box-shadow:0 1px 3px rgba(0,0,0,.05);
  }
  .bord-btn::after{
    content:'Tavolinë';
    font-size:.55rem;font-weight:600;
    text-transform:uppercase;letter-spacing:.4px;
    opacity:.5;
  }
  .bord-btn:active{transform:scale(.94)}
  .bord-btn.aktiv{
    background:var(--brun);border-color:var(--brun);color:#fff;
    box-shadow:0 4px 14px rgba(26,10,5,.3);
  }
  .bord-btn.aktiv::after{opacity:.6;color:#fff}

  /* ── KATEGORI BAR ── */
  #kat-bar{
    display:flex;gap:7px;overflow-x:auto;
    padding:11px 16px;
    background:var(--hvid);
    border-bottom:1px solid var(--border);
    scrollbar-width:none;
  }
  #kat-bar::-webkit-scrollbar{display:none}
  .kat-btn{
    flex-shrink:0;padding:8px 18px;
    border-radius:99px;border:1.5px solid var(--border);
    background:var(--hvid);font-size:.8rem;font-weight:600;
    cursor:pointer;white-space:nowrap;transition:all .15s;
    font-family:inherit;color:var(--tekst-lys);
  }
  .kat-btn:hover{border-color:var(--guld);color:var(--tekst)}
  .kat-btn.aktiv{
    background:var(--brun);border-color:var(--brun);color:#fff;
    box-shadow:0 2px 8px rgba(26,10,5,.2);
  }

  /* ── PRODUKT GRID ── */
  #prod-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(145px,1fr));
    gap:11px;padding:14px 16px;flex:1;align-content:start;
  }
  .pk{
    background:var(--hvid);border:none;border-radius:16px;
    padding:16px 12px 14px;text-align:center;
    cursor:pointer;transition:transform .15s,box-shadow .15s;
    position:relative;user-select:none;
    box-shadow:0 1px 4px rgba(0,0,0,.07),0 4px 14px rgba(0,0,0,.05);
  }
  .pk:active{transform:scale(.95);box-shadow:none}
  .pk.udsolgt{opacity:.38;pointer-events:none}
  .pk-ikon{font-size:2rem;margin-bottom:7px;line-height:1;display:block}
  .pk-navn{font-size:.8rem;font-weight:700;line-height:1.35;margin-bottom:5px;color:var(--tekst)}
  .pk-pris{font-size:.88rem;color:var(--guld);font-weight:800}
  .pk-udsolgt-tag{
    position:absolute;top:8px;right:8px;
    background:var(--roed);color:#fff;
    font-size:.58rem;font-weight:800;padding:2px 6px;border-radius:6px;
    text-transform:uppercase;letter-spacing:.3px;
  }

  /* ── SIZE BOTTOM SHEET ── */
  .overlay{
    position:fixed;inset:0;
    background:rgba(0,0,0,.45);
    backdrop-filter:blur(4px);
    -webkit-backdrop-filter:blur(4px);
    z-index:200;display:none;align-items:flex-end;
  }
  .overlay.vis{display:flex;animation:fadeIn .2s ease}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  .sheet{
    background:var(--hvid);
    border-radius:22px 22px 0 0;
    padding:22px 18px 34px;
    width:100%;max-height:80dvh;overflow-y:auto;
    animation:slideUp .25s cubic-bezier(.32,1,.32,1);
    box-shadow:0 -8px 32px rgba(0,0,0,.14);
  }
  @keyframes slideUp{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
  .sheet h3{
    font-size:1rem;font-weight:800;margin-bottom:16px;text-align:center;
    color:var(--tekst);
    padding-bottom:14px;border-bottom:1px solid var(--border);
  }
  .size-btn{
    width:100%;display:flex;align-items:center;justify-content:space-between;
    padding:14px 16px;border:1.5px solid var(--border);border-radius:14px;
    background:var(--hvid);font-size:.9rem;font-weight:600;cursor:pointer;
    margin-bottom:9px;font-family:inherit;transition:all .15s;
  }
  .size-btn:active{background:var(--bg2);transform:scale(.98)}
  .size-btn[disabled]{opacity:.38;pointer-events:none}
  .size-m{
    width:34px;height:34px;border-radius:50%;
    background:var(--brun);color:#fff;
    display:flex;align-items:center;justify-content:center;
    font-size:.78rem;font-weight:800;
    flex-shrink:0;
  }
  .size-pris{color:var(--guld);font-weight:800;font-size:.95rem}
  .sheet-annulo{
    width:100%;padding:13px;border:none;border-radius:12px;
    background:var(--bg2);font-size:.9rem;font-weight:700;
    cursor:pointer;margin-top:6px;font-family:inherit;
    color:var(--tekst-lys);transition:all .15s;
  }
  .sheet-annulo:hover{background:var(--border)}

  /* ── KURV STICKY BAR ── */
  #kurv-bar{
    position:sticky;bottom:0;
    background:rgba(26,10,5,.9);
    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);
    color:#fff;padding:14px 18px;
    display:none;align-items:center;justify-content:space-between;gap:14px;
    border-top:1px solid rgba(255,255,255,.08);
    box-shadow:0 -4px 20px rgba(0,0,0,.2);
  }
  #kurv-bar.vis{display:flex}
  #kurv-info{font-size:.84rem}
  #kurv-antal{font-weight:800;font-size:.95rem;margin-bottom:2px}
  #kurv-total-val{color:var(--guld-lys);font-weight:600;font-size:.84rem}
  #btn-vis-kurv{
    background:var(--guld);color:#fff;border:none;border-radius:12px;
    padding:12px 20px;font-size:.9rem;font-weight:800;cursor:pointer;
    flex-shrink:0;font-family:inherit;
    box-shadow:0 2px 10px rgba(240,165,0,.35);
    transition:all .15s;
  }
  #btn-vis-kurv:hover{background:#D97706}

  /* ── KURV SHEET ── */
  #kurv-sheet .sheet{padding-bottom:22px}
  .ki{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--border)}
  .ki-navn{flex:1;font-size:.86rem;font-weight:600;color:var(--tekst);line-height:1.35}
  .ki-ctrl{display:flex;align-items:center;gap:9px}
  .ki-btn{
    width:30px;height:30px;border-radius:50%;
    border:1.5px solid var(--border);background:var(--bg);
    font-size:1.1rem;font-weight:700;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    line-height:1;font-family:inherit;transition:all .12s;
  }
  .ki-btn:hover{background:var(--brun);color:#fff;border-color:var(--brun)}
  .ki-antal{min-width:22px;text-align:center;font-weight:800;font-size:.9rem;font-variant-numeric:tabular-nums}
  .ki-pris{font-size:.85rem;color:var(--guld);font-weight:800;min-width:58px;text-align:right;font-variant-numeric:tabular-nums}
  .kurv-total{
    display:flex;justify-content:space-between;
    padding:14px 0 0;font-weight:800;font-size:1rem;
    border-top:2px solid var(--border);margin-top:4px;
  }
  .kurv-total span:last-child{color:var(--guld)}
  #noter-inp{
    width:100%;margin:14px 0 0;padding:11px 14px;
    border:1.5px solid var(--border);border-radius:12px;
    font-size:.88rem;font-family:inherit;color:var(--tekst);background:var(--bg);
    transition:border-color .18s;
  }
  #noter-inp:focus{outline:none;border-color:var(--guld);background:var(--hvid)}
  #btn-dergo{
    width:100%;margin-top:14px;padding:15px;
    background:var(--groen);color:#fff;border:none;border-radius:14px;
    font-size:1rem;font-weight:800;cursor:pointer;letter-spacing:.2px;
    font-family:inherit;transition:all .18s;
    box-shadow:0 2px 10px rgba(16,185,129,.3);
  }
  #btn-dergo:hover:not(:disabled){background:#059669;box-shadow:0 4px 16px rgba(16,185,129,.35)}
  #btn-dergo:disabled{background:var(--border);color:var(--tekst-lys);cursor:default;box-shadow:none}

  /* ── KONFIRMIM ── */
  #konfirmim{
    display:none;position:fixed;inset:0;
    background:var(--hvid);flex-direction:column;
    align-items:center;justify-content:center;
    text-align:center;padding:30px;z-index:300;
  }
  #konfirmim.vis{display:flex;animation:fadeIn .25s ease}
  .konf-ikon{
    font-size:5rem;margin-bottom:18px;
    animation:popIn .4s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes popIn{from{opacity:0;transform:scale(.4)}to{opacity:1;transform:scale(1)}}
  .konf-titull{font-size:1.5rem;font-weight:800;margin-bottom:8px;color:var(--tekst)}
  .konf-sub{color:var(--tekst-lys);font-size:.9rem;margin-bottom:32px;line-height:1.6}
  #btn-porosi-re{
    padding:14px 30px;background:var(--brun);color:#fff;border:none;
    border-radius:14px;font-size:.95rem;font-weight:800;cursor:pointer;
    font-family:inherit;transition:all .15s;
    box-shadow:0 2px 10px rgba(26,10,5,.2);
  }
  #btn-porosi-re:hover{background:#2D1208}

  /* ── LOADING ── */
  #loading{
    display:flex;flex-direction:column;align-items:center;
    justify-content:center;flex:1;gap:14px;color:var(--tekst-lys);
  }
  .spinner{
    width:36px;height:36px;border:3px solid var(--border);
    border-top-color:var(--guld);border-radius:50%;
    animation:spin .8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg)}}

  /* ── TOAST ── */
  #toast{
    position:fixed;bottom:90px;left:50%;
    transform:translateX(-50%) translateY(12px);
    background:var(--tekst);color:#fff;
    padding:10px 22px;border-radius:99px;
    font-size:.84rem;font-weight:700;opacity:0;
    transition:all .25s;z-index:500;white-space:nowrap;
    box-shadow:0 4px 16px rgba(0,0,0,.2);
    font-family:inherit;
  }
  #toast.vis{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div id="header">
  <h1>Artizano <span>Porosi</span></h1>
  <div id="kurv-badge">0</div>
</div>

<div id="loading"><div class="spinner"></div><span>Duke ngarkuar...</span></div>

<div id="app" style="display:none;flex:1;flex-direction:column;display:none">
  <div id="bord-sektion">
    <label>🪑 Zgjidh tavolinën</label>
    <div id="bord-grid"></div>
  </div>
  <div id="kat-bar"></div>
  <div id="prod-grid"></div>
</div>

<div id="kurv-bar">
  <div id="kurv-info">
    <div id="kurv-antal">0 artikuj</div>
    <div id="kurv-total-val">0,00 €</div>
  </div>
  <button id="btn-vis-kurv" onclick="hapKurvSheet()">🛒 Shiko shportën</button>
</div>

<!-- SIZE SHEET -->
<div class="overlay" id="size-overlay" onclick="if(event.target===this)this.classList.remove('vis')">
  <div class="sheet">
    <h3 id="size-titull">Zgjidh madhësinë</h3>
    <div id="size-opsionet"></div>
    <button class="sheet-annulo" onclick="document.getElementById('size-overlay').classList.remove('vis')">Anulo</button>
  </div>
</div>

<!-- KURV SHEET -->
<div class="overlay" id="kurv-sheet" onclick="if(event.target===this)this.classList.remove('vis')">
  <div class="sheet">
    <h3>🛒 Shporta juaj</h3>
    <div id="kurv-liste"></div>
    <div class="kurv-total"><span>Totali</span><span id="kurv-total-sheet">0,00 €</span></div>
    <input type="text" id="noter-inp" placeholder="📝 Shënim (pa qepë, alergjia...)">
    <button id="btn-dergo" onclick="dergoBestillim()" disabled>✓ Dërgo porosinë</button>
  </div>
</div>

<!-- KONFIRMIM -->
<div id="konfirmim">
  <div class="konf-ikon">✅</div>
  <div class="konf-titull">Porosi u dërgua!</div>
  <div class="konf-sub" id="konf-sub">Tavolina — • Porosi #—</div>
  <button id="btn-porosi-re" onclick="porosiRe()">+ Porosi e re</button>
</div>

<div id="toast"></div>

<script>
const SUPABASE_URL = 'https://tsaxlluggcxdrvapaypp.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRzYXhsbHVnZ2N4ZHJ2YXBheXBwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzNTU0MTAsImV4cCI6MjA5MzkzMTQxMH0.bIXF0dXrWSgtpYCpNzZz5Rh5BB_0R37dzNp_8jgFZGM';
const RESTAURANT_ID = '0860de87-efd6-4ef4-b191-7635bc44e866';

let sb, kategorier=[], produkter=[], tavolina=[];
let kurv=[], aktivKat='alle', valgBord=null;

function euro(v){return Number(v).toFixed(2).replace('.',',')+' €'}
function unikID(){return 'id_'+Date.now()+'_'+Math.random().toString(36).slice(2,7)}
function visToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('vis');setTimeout(()=>t.classList.remove('vis'),2500)}

function emriBaze(emri){return emri.replace(/\s*\([SML]\)\s*$/,'').trim()}
function madhesia(emri){const m=emri.match(/\(([SML])\)\s*$/);return m?m[1]:null}

// ── LOAD ──
async function init(){
  sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  const [katRes, prodRes, tavRes] = await Promise.all([
    sb.from('kategorier').select('*').eq('restaurant_id',RESTAURANT_ID).order('sort'),
    sb.from('produkter').select('*').eq('restaurant_id',RESTAURANT_ID),
    sb.from('tavolina').select('*').eq('restaurant_id',RESTAURANT_ID)
  ]);
  kategorier = katRes.data || [];
  produkter  = prodRes.data || [];
  tavolina   = tavRes.data || [];

  document.getElementById('loading').style.display='none';
  const app=document.getElementById('app');
  app.style.display='flex';
  app.style.flexDirection='column';
  app.style.flex='1';

  renderBorde();
  renderKat();
  renderGrid();
}

// ── BORDE ──
function renderBorde(){
  const grid=document.getElementById('bord-grid');
  grid.innerHTML=tavolina.map(t=>`
    <button class="bord-btn${valgBord===t.nr?' aktiv':''}" onclick="valgBordFn('${t.nr}')">${t.nr}</button>
  `).join('');
}
function valgBordFn(nr){
  valgBord = valgBord===nr ? null : nr;
  renderBorde();
  opdaterKurvBar();
}

// ── KATEGORI ──
function renderKat(){
  const bar=document.getElementById('kat-bar');
  bar.innerHTML=`<button class="kat-btn${aktivKat==='alle'?' aktiv':''}" onclick="filtrerKat('alle')">Të gjitha</button>`+
    kategorier.map(k=>`<button class="kat-btn${aktivKat===k.id?' aktiv':''}" onclick="filtrerKat('${k.id}')">${k.navn}</button>`).join('');
}
function filtrerKat(id){aktivKat=id;renderKat();renderGrid()}

// ── PRODUKT GRID ──
function renderGrid(){
  const grid=document.getElementById('prod-grid');
  const liste=aktivKat==='alle'?produkter:produkter.filter(p=>p.kategori_id===aktivKat);
  if(!liste.length){grid.innerHTML='<p style="color:var(--tekst-lys);padding:20px;grid-column:1/-1">Nuk ka produkte.</p>';return}

  // Gruopo S/M/L
  const grupe={};
  liste.forEach(p=>{
    const baze=emriBaze(p.navn);
    const k=baze+'||'+p.kategori_id;
    if(!grupe[k]) grupe[k]={baze,ikon:p.ikon||'🍽️',produktet:[]};
    grupe[k].produktet.push(p);
  });
  const renditje={S:0,M:1,L:2};
  Object.values(grupe).forEach(g=>g.produktet.sort((a,b)=>(renditje[madhesia(a.navn)]??9)-(renditje[madhesia(b.navn)]??9)));

  grid.innerHTML=Object.values(grupe).map(g=>{
    if(g.produktet.length===1){
      const p=g.produktet[0];
      return `<div class="pk${p.udsolgt?' udsolgt':''}" onclick="shtoNe('${p.id}')">
        <div class="pk-ikon">${p.ikon||'🍽️'}</div>
        <div class="pk-navn">${p.navn}</div>
        <div class="pk-pris">${euro(p.pris)}</div>
        ${p.udsolgt?'<div class="pk-udsolgt-tag">MBARUAR</div>':''}
      </div>`;
    }
    const cmin=Math.min(...g.produktet.map(p=>p.pris));
    const cmax=Math.max(...g.produktet.map(p=>p.pris));
    const ids=g.produktet.map(p=>p.id).join(',');
    return `<div class="pk" onclick="hapSize('${ids}')">
      <div class="pk-ikon">${g.ikon}</div>
      <div class="pk-navn">${g.baze}</div>
      <div class="pk-pris">${cmin===cmax?euro(cmin):euro(cmin)+'–'+euro(cmax)}</div>
      <div style="display:flex;justify-content:center;gap:4px;margin-top:4px">
        ${g.produktet.map(p=>`<span style="background:var(--brun);color:#fff;border-radius:50%;width:18px;height:18px;font-size:.6rem;font-weight:700;display:inline-flex;align-items:center;justify-content:center">${madhesia(p.navn)||'?'}</span>`).join('')}
      </div>
    </div>`;
  }).join('');
}

// ── SIZE PICKER ──
function hapSize(idsStr){
  const prods=idsStr.split(',').map(id=>produkter.find(p=>p.id===id)).filter(Boolean);
  document.getElementById('size-titull').textContent=emriBaze(prods[0].navn)+' — Zgjidh madhësinë';
  document.getElementById('size-opsionet').innerHTML=prods.map(p=>{
    const m=madhesia(p.navn)||p.navn;
    const etiket={S:'E Vogël',M:'E Mesme',L:'E Madhe'}[m]||m;
    return `<button class="size-btn" onclick="shtoNe('${p.id}');document.getElementById('size-overlay').classList.remove('vis')" ${p.udsolgt?'disabled':''}>
      <div style="display:flex;align-items:center;gap:10px">
        <div class="size-m">${m}</div>
        <span>${etiket}${p.udsolgt?' · <span style="color:var(--roed);font-size:.75rem">Mbaruar</span>':''}</span>
      </div>
      <span class="size-pris">${euro(p.pris)}</span>
    </button>`;
  }).join('');
  document.getElementById('size-overlay').classList.add('vis');
}

// ── SHPORTA ──
function shtoNe(prodId){
  const prod=produkter.find(p=>p.id===prodId);
  if(!prod||prod.udsolgt) return;
  const ekz=kurv.find(i=>i.produkt_id===prodId);
  if(ekz){ekz.antal++}else{kurv.push({produkt_id:prodId,produkt_navn:prod.navn,produkt_pris:prod.pris,antal:1})}
  opdaterKurvBar();
  visToast(prod.navn+' u shtua ✓');
}
function ndryshoAntal(idx,delta){
  kurv[idx].antal+=delta;
  if(kurv[idx].antal<=0) kurv.splice(idx,1);
  renderKurvSheet();
  opdaterKurvBar();
}

function totalKurv(){return kurv.reduce((s,i)=>s+i.produkt_pris*i.antal,0)}

function opdaterKurvBar(){
  const bar=document.getElementById('kurv-bar');
  const badge=document.getElementById('kurv-badge');
  const totalAntal=kurv.reduce((s,i)=>s+i.antal,0);
  const tot=totalKurv();
  if(kurv.length){
    bar.classList.add('vis');
    badge.style.display='block';
    badge.textContent=totalAntal;
    document.getElementById('kurv-antal').textContent=totalAntal+' artikuj';
    document.getElementById('kurv-total-val').textContent=euro(tot);
  } else {
    bar.classList.remove('vis');
    badge.style.display='none';
  }
  // opdater send-knap i sheet
  const btn=document.getElementById('btn-dergo');
  if(btn) btn.disabled=!kurv.length||!valgBord;
}

function hapKurvSheet(){
  renderKurvSheet();
  document.getElementById('kurv-sheet').classList.add('vis');
}

function renderKurvSheet(){
  const liste=document.getElementById('kurv-liste');
  if(!kurv.length){liste.innerHTML='<p style="color:var(--tekst-lys);padding:10px 0;font-size:.85rem">Shporta është bosh.</p>';return}
  liste.innerHTML=kurv.map((i,idx)=>`
    <div class="ki">
      <div class="ki-navn">${i.produkt_navn}</div>
      <div class="ki-ctrl">
        <button class="ki-btn" onclick="ndryshoAntal(${idx},-1)">−</button>
        <span class="ki-antal">${i.antal}</span>
        <button class="ki-btn" onclick="ndryshoAntal(${idx},1)">+</button>
      </div>
      <div class="ki-pris">${euro(i.produkt_pris*i.antal)}</div>
    </div>
  `).join('');
  document.getElementById('kurv-total-sheet').textContent=euro(totalKurv());
  const btn=document.getElementById('btn-dergo');
  btn.disabled=!kurv.length||!valgBord;
  if(!valgBord) btn.textContent='⚠ Zgjidh tavolinën së pari';
  else btn.textContent='✓ Dërgo porosinë te tavolina '+valgBord;
}

// ── DËRGO ──
async function dergoBestillim(){
  if(!kurv.length||!valgBord) return;
  const btn=document.getElementById('btn-dergo');
  btn.disabled=true;
  btn.textContent='Duke dërguar...';

  try {
    // Merr numrin max të porosisë
    const {data:maxRes} = await sb.from('ordrer').select('ordre_nummer').eq('restaurant_id',RESTAURANT_ID).order('ordre_nummer',{ascending:false}).limit(1);
    const nextNr = maxRes&&maxRes.length ? maxRes[0].ordre_nummer+1 : 1001;

    const total = parseFloat(totalKurv().toFixed(2));
    const note  = document.getElementById('noter-inp').value.trim();
    const ordreId = unikID();

    const {error:ordErr} = await sb.from('ordrer').insert({
      id: ordreId,
      restaurant_id: RESTAURANT_ID,
      ordre_nummer: nextNr,
      status: 'ventende',
      bord: valgBord,
      note: note||null,
      betaling: null,
      subtotal: total,
      moms: parseFloat((total*0.18).toFixed(2)),
      total,
      oprettet: new Date().toISOString(),
      betalt: null
    });
    if(ordErr) throw ordErr;

    const linjer=kurv.map(i=>({
      ordre_id: ordreId,
      produkt_id: i.produkt_id,
      navn: i.produkt_navn,
      pris: i.produkt_pris,
      antal: i.antal
    }));
    const {error:linjeErr} = await sb.from('ordre_linjer').insert(linjer);
    if(linjeErr) throw linjeErr;

    // Sukses
    document.getElementById('kurv-sheet').classList.remove('vis');
    document.getElementById('konf-sub').textContent=`Tavolina ${valgBord} • Porosi #${nextNr} • ${euro(total)}`;
    document.getElementById('konfirmim').classList.add('vis');

  } catch(e) {
    console.error(e);
    visToast('❌ Gabim! Provo sërish.');
    btn.disabled=false;
    btn.textContent='✓ Dërgo porosinë';
  }
}

function porosiRe(){
  kurv=[];
  valgBord=null;
  document.getElementById('noter-inp').value='';
  document.getElementById('konfirmim').classList.remove('vis');
  opdaterKurvBar();
  renderBorde();
  renderGrid();
  window.scrollTo(0,0);
}

document.addEventListener('DOMContentLoaded', init);
</script>
